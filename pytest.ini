[pytest]
testpaths = tests
# Environment isolation (throwaway DB, empty books dir) is set in
# tests/conftest.py, which must run BEFORE any app module is imported.
filterwarnings =
    error::DeprecationWarning:app.*
    # scripts/build_covers.py pulls in PyMuPDF, whose SWIG bindings warn on
    # import under 3.14. Not our code and not shipped (it's a build script).
    ignore:builtin type Swig.*:DeprecationWarning
    ignore:builtin type swigvarlink.*:DeprecationWarning
